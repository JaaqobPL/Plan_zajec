<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan zajęć 2M4</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#222222">
<link rel="apple-touch-icon" href="icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-main: #222222;
    --bg-card: #373737;
    --bg-inactive: rgba(55, 55, 55, 0.3);
    --text-main: #F4EDE4;
    --text-muted: rgba(244, 237, 228, 0.7);
    --text-inactive: rgba(244, 237, 228, 0.3);
    --accent-red: #D7263D;
    --divider: #5B5B5B;
  }

  body { font-family: 'Nunito', sans-serif; background: var(--bg-main); margin: 0; display: flex; justify-content: center; color: var(--text-main); }
  .app { width: 100%; max-width: 400px; min-height: 100vh; padding: 20px 15px; box-sizing: border-box; }
  
  /* Górny pasek z Twojego designu */
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; margin-top: 5px; }
  .brand { font-size: 25px; font-weight: 600; letter-spacing: 0.5px; }
  .action-icons { display: flex; gap: 12px; }
  
  .icon-btn { 
    border-radius: 16px; width: 42px; height: 42px; border: none;
    display: flex; justify-content: center; align-items: center; cursor: pointer; 
    box-shadow: 0 4px 4px rgba(0,0,0,0.25); transition: 0.2s; color: var(--text-main);
  }
  .icon-btn:active { transform: scale(0.9); }
  
  #toggle-all { background: var(--bg-card); }
  #toggle-all.icon-active { background: #555; box-shadow: inset 0 2px 5px rgba(0,0,0,0.3); }
  #open-modal { background: var(--accent-red); }

  /* Nawigacja Dni */
  .header { 
    background: var(--bg-card); border-radius: 16px; padding: 10px 15px; 
    margin-bottom: 25px; display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 4px 4px rgba(0,0,0,0.25);
  }
  .text-center { text-align: center; flex-grow: 1; }
  .title { font-size: 26px; margin: 0; font-weight: 400; }
  .date { font-size: 15px; color: var(--text-muted); margin-top: 2px; }
  .week { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  
  .btn { background: none; border: none; cursor: pointer; padding: 5px 10px; transition: 0.2s; color: var(--text-main); display: flex; align-items: center; }
  .btn:active { transform: scale(0.8); }
  
  /* Linia oddzielająca z designu */
  .divider { border-top: 1px solid var(--divider); margin-bottom: 25px; opacity: 0.8; }
  
  /* Karty zajęć */
  .card { 
    background: var(--bg-card); border-radius: 16px; 
    padding: 15px 15px 12px 15px; margin-bottom: 15px; display: flex; flex-direction: column; 
    text-decoration: none; color: var(--text-main); position: relative;
    box-shadow: 0 4px 4px rgba(0,0,0,0.25);
    border-left: 7px solid var(--accent-red); /* Domyślny czerwony z designu, zmieniany w JS */
  }
  
  .card-title { text-align: center; font-size: 24px; line-height: 1.2; margin-bottom: 4px; }
  .card-prof { text-align: center; font-size: 14px; color: var(--text-main); margin-bottom: 18px; }
  .row { display: flex; justify-content: space-between; align-items: flex-end; }
  .godzina { font-size: 18px; }
  .sala { font-size: 24px; line-height: 0.9; }
  
  /* Karta nieaktywna (Duch) */
  .inactive-card { 
    background: var(--bg-inactive) !important; 
    border-left: 7px solid var(--text-inactive) !important; 
    box-shadow: 0 4px 4px rgba(0,0,0,0.25) !important;
  }
  .inactive-card * { color: var(--text-inactive) !important; }
  .inactive-badge { font-size: 10px; text-align: center; margin-bottom: 5px; letter-spacing: 1px; }

  /* Okienko */
  .okienko { 
    text-align: center; padding: 10px; margin-bottom: 15px; 
    background: var(--bg-inactive); border-radius: 16px; 
    color: var(--text-main); font-size: 20px; box-shadow: 0 4px 4px rgba(0,0,0,0.25);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .okienko-czas { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  
  .msg { text-align: center; font-size: 18px; color: var(--text-muted); margin-top: 50px; display: none; }

  /* Modal (Rozpiska) */
  .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
  .modal-content { background: var(--bg-main); border: 1px solid var(--bg-card); padding: 20px; border-radius: 16px; width: 95%; max-width: 400px; max-height: 85vh; overflow-y: auto; position: relative; box-sizing: border-box; }
  .close { position: absolute; right: 15px; top: 10px; font-size: 32px; cursor: pointer; color: var(--text-muted); line-height: 1; }
  table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; text-align: center; color: var(--text-main); }
  th, td { border: 1px solid var(--divider); padding: 8px 2px; }
  th { background: var(--bg-card); font-weight: bold; }
  .t-x1 { background: var(--bg-main); }
  .t-x2 { background: var(--bg-inactive); }
</style>
</head>
<body>
<div class="app">
  
  <div class="top-bar">
    <div class="brand">Plan zajęć 2M4</div>
    <div class="action-icons">
      <button class="icon-btn" id="toggle-all" title="Pokaż/ukryj resztę zajęć">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
      </button>
      <button class="icon-btn" id="open-modal" title="Rozpiska semestru">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
      </button>
    </div>
  </div>

  <div class="header">
    <button class="btn" id="prev">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <div class="text-center">
      <h1 class="title" id="tytul"></h1>
      <div class="date" id="data"></div>
      <div class="week" id="info"></div>
    </div>
    <button class="btn" id="next">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>
  </div>
  
  <div class="divider"></div>
  
  <div id="plan-container"></div>
  <div id="komunikat" class="msg"></div>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" id="close-modal">&times;</span>
    <h2 style="margin: 0 0 5px 0; font-size: 20px; color: var(--text-main);">Rozpiska Semestru</h2>
    <div style="overflow-x: auto;">
      <table id="tabela-tygodni"></table>
    </div>
  </div>
</div>

<script>
  let baza = null; 
  let dataWysw = new Date();
  let pokazWszystkie = false;
  
  const nazwyDni = ["Niedziela", "Poniedziałek", "Wtorek", "Środa", "Czwartek", "Piątek", "Sobota"];
  const miesiace = ["stycznia", "lutego", "marca", "kwietnia", "maja", "czerwca", "lipca", "sierpnia", "września", "października", "listopada", "grudnia"];
  
  const tygodnieDane = [
    ["02.03","03.03","04.03","05.03","06.03"], ["09.03","10.03","11.03","12.03","13.03"],
    ["16.03","17.03","18.03","19.03","20.03"], ["23.03","24.03","25.03","26.03","27.03"],
    ["30.03","07.04","08.04","31.03","01.04"], ["13.04","21.04","15.04","09.04","10.04"],
    ["20.04","28.04","22.04","16.04","17.04"], ["04.05","05.05","29.04","23.04","24.04"],
    ["11.05","12.05","06.05","30.04","27.04"], ["18.05","19.05","13.05","07.05","08.05"],
    ["25.05","26.05","20.05","14.05","15.05"], ["01.06","02.06","27.05","21.05","22.05"],
    ["08.06","09.06","03.06","28.05","29.05"], ["15.06","16.06","10.06","11.06","12.06"],
    ["22.06","23.06","17.06","18.06","19.06"]
  ];

  const kalendarzMap = {};
  tygodnieDane.forEach((tydz, index) => {
    tydz.forEach((data, i) => kalendarzMap[data] = { dzienWPlanie: i + 1, tydzien: index + 1 });
  });

  function pasuje(zapis, aktTyg) {
    if (!zapis || zapis === "oba") return true;
    const fragmenty = zapis.toLowerCase().split(',').map(s => s.trim());
    let maZakresy = false; let pasujeZakres = false;
    for (const frag of fragmenty) {
      if (/^\d+(-\d+)?$/.test(frag)) { 
        maZakresy = true;
        const [start, end] = frag.split('-').map(Number);
        if (end ? (aktTyg >= start && aktTyg <= end) : (aktTyg === start)) pasujeZakres = true;
      }
    }
    if (maZakresy && !pasujeZakres) return false;
    for (const frag of fragmenty) {
      if ((frag === "x1" || frag === "nieparzyste") && aktTyg % 2 === 0) return false;
      if ((frag === "x2" || frag === "parzyste" || frag === "pażyste") && aktTyg % 2 !== 0) return false;
      if ((frag === "1 polowa" || frag === "1 połowa") && aktTyg > 8) return false;
      if ((frag === "2 polowa" || frag === "2 połowa") && aktTyg < 9) return false;
    }
    return true; 
  }

  document.getElementById("toggle-all").onclick = () => {
    pokazWszystkie = !pokazWszystkie;
    document.getElementById("toggle-all").classList.toggle("icon-active", pokazWszystkie);
    render();
  };

  const modal = document.getElementById("modal");
  document.getElementById("open-modal").onclick = () => {
    modal.style.display = "flex";
    const tab = document.getElementById("tabela-tygodni");
    if (!tab.innerHTML) {
      let html = "<tr><th>Tyg</th><th>Pon</th><th>Wt</th><th>Śr</th><th>Czw</th><th>Pt</th></tr>";
      tygodnieDane.forEach((tydz, i) => {
        const t = i + 1;
        const klasa = t % 2 === 0 ? "t-x2" : "t-x1";
        const polowa = t <= 8 ? "1 poł." : "2 poł.";
        const typ = t % 2 === 0 ? "x2" : "x1";
        html += `<tr class="${klasa}">
          <td><b>t${t}</b><br><small style="color:var(--text-muted)">${typ}</small><br><small style="color:var(--text-muted)">${polowa}</small></td>
          <td>${tydz[0]}</td><td>${tydz[1]}</td><td>${tydz[2]}</td><td>${tydz[3]}</td><td>${tydz[4]}</td>
        </tr>`;
      });
      tab.innerHTML = html;
    }
  };
  document.getElementById("close-modal").onclick = () => modal.style.display = "none";
  window.onclick = (e) => { if (e.target === modal) modal.style.display = "none"; };

  document.getElementById("prev").onclick = () => { dataWysw.setDate(dataWysw.getDate() - 1); render(); };
  document.getElementById("next").onclick = () => { dataWysw.setDate(dataWysw.getDate() + 1); render(); };

  async function start() {
    try {
      const res = await fetch('plan.json');
      baza = await res.json();
      render();
    } catch {
      const msg = document.getElementById("komunikat");
      msg.style.display = "block"; msg.innerText = "Błąd pobierania planu. Sprawdź plik JSON.";
    }
  }

  function render() {
    if (!baza) return;
    const kontener = document.getElementById("plan-container");
    const msg = document.getElementById("komunikat");
    kontener.innerHTML = ""; msg.style.display = "none";

    document.getElementById("data").innerText = `${dataWysw.getDate()} ${miesiace[dataWysw.getMonth()]} ${dataWysw.getFullYear()}`;
    const dzisiajStr = `${String(dataWysw.getDate()).padStart(2,'0')}.${String(dataWysw.getMonth()+1).padStart(2,'0')}`;
    const info = kalendarzMap[dzisiajStr];
    
    if (!info && !pokazWszystkie) {
      document.getElementById("tytul").innerText = nazwyDni[dataWysw.getDay()];
      document.getElementById("info").innerText = "Brak zajęć dydaktycznych";
      msg.style.display = "block"; msg.innerText = "Brak zajęć"; 
      return;
    }

    const dWPlanie = info ? info.dzienWPlanie : dataWysw.getDay();
    
    if (info) {
      const nazwaPrawdziwa = nazwyDni[dataWysw.getDay()];
      const nazwaZPlanu = nazwyDni[info.dzienWPlanie];
      document.getElementById("tytul").innerText = nazwaPrawdziwa !== nazwaZPlanu ? `${nazwaPrawdziwa} (${nazwaZPlanu})` : nazwaZPlanu;
      document.getElementById("info").innerText = `Tydzień: ${info.tydzien}/15 (${info.tydzien % 2 === 0 ? "x2" : "x1"}, ${info.tydzien <= 8 ? "1 połowa" : "2 połowa"})`;
    } else {
      document.getElementById("tytul").innerText = nazwyDni[dataWysw.getDay()];
      document.getElementById("info").innerText = "Pokazuję opcje dla tego dnia tyg.";
    }

    let wszystkieDnia = baza.plan.filter(z => z.dzien === dWPlanie);
    let ostateczneZajecia = [];

    wszystkieDnia.forEach(z => {
      const naPewnoSieOdbywa = info ? pasuje(z.tygodnie, info.tydzien) : false;
      if (naPewnoSieOdbywa || pokazWszystkie) {
        ostateczneZajecia.push({ ...z, naPewnoSieOdbywa });
      }
    });

    if (!ostateczneZajecia.length) { 
      msg.style.display = "block"; 
      msg.innerText = pokazWszystkie ? "W ten dzień tygodnia w ogóle nie masz żadnych zajęć w planie." : "Nie masz przypisanych zajęć na ten dzień."; 
      return; 
    }

    ostateczneZajecia.sort((a, b) => (parseInt(a.od.split(":")[0])*60 + parseInt(a.od.split(":")[1])) - (parseInt(b.od.split(":")[0])*60 + parseInt(b.od.split(":")[1])));
    let koniecPoprzednich = null;

    ostateczneZajecia.forEach(z => {
      const p = baza.przedmioty[z.id_przedmiotu];
      if (!p) return;

      const odMin = parseInt(z.od.split(":")[0])*60 + parseInt(z.od.split(":")[1]);
      const doMin = parseInt(z.do.split(":")[0])*60 + parseInt(z.do.split(":")[1]);

      if (z.naPewnoSieOdbywa) {
        if (koniecPoprzednich !== null && (odMin - koniecPoprzednich) > 15) {
          const przerwa = odMin - koniecPoprzednich;
          const godz = Math.floor(przerwa/60);
          const min = przerwa%60;
          let czasTekst = "";
          if(godz > 0) czasTekst += `${godz}h `;
          if(min > 0) czasTekst += `${min}min`;
          
          kontener.innerHTML += `
            <div class="okienko">
              Okienko
              <div class="okienko-czas">${czasTekst}</div>
            </div>`;
        }
        koniecPoprzednich = doMin;
      }

      const el = document.createElement(p.link && p.link !== "#" ? "a" : "div");
      if (p.link && p.link !== "#") { el.href = p.link; el.target = "_blank"; }
      
      const wyswietlanyCzas = `${z.od.padStart(5, '0')} - ${z.do.padStart(5, '0')}`;
      const accentColor = p.kolor || "#D7263D"; // Używa koloru z JSONa lub domyślnego czerwonego

      if (z.naPewnoSieOdbywa) {
        el.className = "card";
        el.style.borderLeftColor = accentColor;
        el.innerHTML = `
          <div class="card-title">${p.nazwa}</div>
          <div class="card-prof">${p.wykladowca}</div>
          <div class="row">
            <div class="godzina">${wyswietlanyCzas}</div>
            <div class="sala">${p.sala}</div>
          </div>`;
      } else {
        el.className = "card inactive-card";
        el.innerHTML = `
          <div class="inactive-badge">W INNYM TYGODNIU (${z.tygodnie})</div>
          <div class="card-title">${p.nazwa}</div>
          <div class="card-prof">${p.wykladowca}</div>
          <div class="row">
            <div class="godzina">${wyswietlanyCzas}</div>
            <div class="sala">${p.sala}</div>
          </div>`;
      }
      
      kontener.appendChild(el);
    });
  }

  start();
  setInterval(() => { if (new Date().toDateString() === dataWysw.toDateString()) render(); }, 60000);

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(()=>{}); });
  }
</script>
</body>
</html>
